commands:
  start: |
    Привет! Это бот поддержки <b>Phasalo</b> 👋
  help: |
    🛟 <b>Поддержка Phasalo</b>

    Бот соединяет тебя с оператором нужного проекта.

    <b>Как это работает</b>
    • Твоё обращение становится тикетом — сообщения: текст, фото и даже файлы уходят оператору
    • Оператор отвечает прямо здесь, в этом чате
    • Одновременно ведётся один тикет, когда вопрос решён — оператор его закроет
    • Хочешь открыть новый — просто напиши снова
  about: |
    Разработка <b><a href="https://t.me/phasalo">Phasalo</a></b>
    Дизайн <b><a href="https://t.me/kfprod">KFproduction</a></b>

    2026


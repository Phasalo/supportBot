commands:
  start: |
    Это бот поддержки <b>Phasalo</b>.
    Нажмите «Обратиться», чтобы создать обращение.
  help: |
    🛟 <b>Поддержка Phasalo</b>

    Бот связывает вас с оператором поддержки нужного проекта.
  
    <b>Как это работает</b>
    • Обращение становится тикетом; ваши сообщения — текст, фото, файлы — уходят оператору
    • Оператор отвечает прямо здесь, в этом чате
    • Одновременно открыт один тикет; когда вопрос решён, оператор его закрывает
    • Чтобы открыть новый — просто напишите снова
  about: |
    Разработка <b><a href="https://t.me/phasalo">Phasalo</a></b>
    Дизайн <b><a href="https://t.me/kfprod">KFproduction</a></b>

    2026

